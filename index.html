<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio </title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      scroll-behavior: smooth;
    }

    .navbar {
      background: rgba(0,0,0,0.9);
      border-bottom: 1px solid #0ff;
    }

    .navbar-brand, .nav-link {
      color: #0ff !important;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero img {
      width: 150px;
      border-radius: 50%;
      border: 2px solid #0ff;
      box-shadow: 0 0 15px #0ff;
    }

    .glow {
      text-shadow: 0 0 10px #0ff;
    }

    .card {
      background: #111;
      border: 1px solid #0ff;
      box-shadow: 0 0 10px #0ff33a;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #0ff;
    }

    .filter-btn {
      margin: 5px;
    }

    footer {
      background: #000;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #0ff;
    }

    .social i {
      font-size: 20px;
      margin: 10px;
      color: #0ff;
      transition: 0.3s;
    }

    .social i:hover {
      color: #fff;
    }

    #topBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: none;
      background: #0ff;
      color: #000;
      border: none;
      padding: 10px 15px;
      border-radius: 50%;
      box-shadow: 0 0 10px #0ff;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">⚡ DevCyber</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#hero">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="#stack">Stack</a></li>
        <li class="nav-item"><a class="nav-link" href="#projects">Proyectos</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
  <div>
    <img src="https://via.placeholder.com/150" alt="perfil">
    <h1 class="glow mt-3">👨‍💻 Jose Lopez</h1>
    <p>Full Stack Developer | Cyberpunk Builder 🚀</p>
  </div>
</section>

<!-- Stack -->
<section class="container py-5" id="stack">
  <h2 class="text-center glow mb-4">🧠 Stack Tecnológico</h2>
  <div class="row">
    <div class="col-md-3"><div class="card p-3 text-center">⚛️ React</div></div>
    <div class="col-md-3"><div class="card p-3 text-center">🟢 Node.js</div></div>
    <div class="col-md-3"><div class="card p-3 text-center">🐍 Python</div></div>
    <div class="col-md-3"><div class="card p-3 text-center">☁️ Cloud</div></div>
  </div>
</section>

<!-- Proyectos -->
<section class="container py-5" id="projects">
  <h2 class="text-center glow mb-4">💼 Proyectos</h2>

  <div class="text-center">
    <button class="btn btn-outline-info filter-btn" onclick="filter('all')">Todos</button>
    <button class="btn btn-outline-info filter-btn" onclick="filter('web')">Web</button>
    <button class="btn btn-outline-info filter-btn" onclick="filter('ai')">AI</button>
  </div>

  <div class="row mt-4" id="project-list">
    <div class="col-md-4 project web">
      <div class="card p-3">🌐 Proyecto Web</div>
    </div>
    <div class="col-md-4 project ai">
      <div class="card p-3">🤖 Proyecto AI</div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="social">
    <i class="fab fa-github"></i>
    <i class="fab fa-linkedin"></i>
    <i class="fab fa-twitter"></i>
  </div>
  <p>© 2026 DevCyber</p>
</footer>

<button id="topBtn" onclick="topFunction()">⬆</button>

<script>
  function filter(category) {
    let projects = document.querySelectorAll('.project');
    projects.forEach(p => {
      if (category === 'all' || p.classList.contains(category)) {
        p.style.display = 'block';
      } else {
        p.style.display = 'none';
      }
    });
  }

  let btn = document.getElementById("topBtn");
  window.onscroll = function() {
    btn.style.display = window.scrollY > 300 ? "block" : "none";
  };

  function topFunction() {
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
